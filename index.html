<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Índio Perfume Rio Rise</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000, #1a0000);
  color: #fff;
  text-align: center;
}

header {
  background: #0d0d0d;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
  color: red;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.box {
  background: rgba(255,0,0,0.08);
  padding: 20px;
  border-radius: 20px;
  border: 1px solid rgba(255,0,0,0.3);
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: red;
  color: #fff;
  font-weight: bold;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
}

.card {
  background: #111;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  border: 1px solid red;
  text-align: left;
}

.total {
  margin-top: 15px;
  font-size: 22px;
  color: red;
  font-weight: bold;
}

.economia {
  color: #00ff00;
  margin-top: 10px;
  font-weight: bold;
}

.green { color: #00ff00; }
.yellow { color: yellow; }

</style>
</head>

<body>

<header>Índio Perfume Rio Rise</header>

<div class="container">

  <img src="logo.png" style="width:140px; border-radius:50%; margin-top:10px; box-shadow:0 0 20px red;">

  <div class="box">

    <input id="server" placeholder="Servidor">
    <input id="nick" placeholder="Nick do jogador">

    <div class="grid">
      <button onclick="add(1000)">1K</button>
      <button onclick="add(200000)">200K</button>
      <button onclick="add(500000)">500K</button>
      <button onclick="add(1000000)">1KK</button>
    </div>

    <h4>Quantidade personalizada</h4>
    <input id="custom" type="number" placeholder="Digite a quantidade">

    <button onclick="addCustom()">Adicionar</button>

    <div class="total" id="total">Total: R$ 0,00</div>
    <div class="economia" id="economia"></div>

    <button onclick="enviar()">Enviar pedido</button>
    <button onclick="limpar()" style="background:#333;">Limpar carrinho</button>

  </div>

  <h3>📦 Pedidos</h3>
  <div id="lista"></div>

</div>

<script>

let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

function calcular(qtd) {

  let base = (qtd / 1000) * 0.60;
  let valor = base;
  let economia = 0;

  if (qtd >= 500000) {
    valor = (qtd / 1000) * 0.50;
    economia = base - valor;
  }

  return { valor, economia };
}

function atualizarTotal() {

  let total = pedidos.reduce((acc, p) => acc + p.valor, 0);

  document.getElementById("total").innerText =
    "Total: R$ " + total.toFixed(2);
}

function add(qtd) {

  let res = calcular(qtd);

  let pedido = {
    id: Date.now(),
    server: document.getElementById("server").value,
    nick: document.getElementById("nick").value,
    qtd: qtd,
    valor: res.valor,
    status: "Pendente"
  };

  pedidos.push(pedido);
  salvar();
  render();
}

function addCustom() {

  let qtd = parseInt(document.getElementById("custom").value);

  if (!qtd || qtd <= 0) {
    alert("Digite uma quantidade válida!");
    return;
  }

  add(qtd);
}

function salvar() {
  localStorage.setItem("pedidos", JSON.stringify(pedidos));
}

function render() {

  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let totalEconomia = 0;

  pedidos.forEach(p => {

    if (p.qtd >= 500000) {
      totalEconomia += (p.qtd/1000)*0.60 - p.valor;
    }

    lista.innerHTML += `
      <div class="card">
        <b>Servidor:</b> ${p.server}<br>
        <b>Nick:</b> ${p.nick}<br>
        <b>Qtd:</b> ${p.qtd}<br>
        <b>Valor:</b> R$ ${p.valor.toFixed(2)}<br>
        <b>Status:</b> <span class="${p.status === "Pago" ? "green" : "yellow"}">${p.status}</span><br>

        <button onclick="confirmar(${p.id})">Confirmar pagamento</button>
      </div>
    `;
  });

  atualizarTotal();

  if (totalEconomia > 0) {
    document.getElementById("economia").innerText =
      "💰 Economia total: R$ " + totalEconomia.toFixed(2);
  }
}

function confirmar(id) {

  pedidos = pedidos.map(p => {
    if (p.id === id) {
      p.status = "Pago";
    }
    return p;
  });

  salvar();
  render();
}

function limpar() {
  pedidos = [];
  salvar();
  render();
}

function enviar() {

  let server = document.getElementById("server").value;
  let nick = document.getElementById("nick").value;

  if (!server || !nick || pedidos.length === 0) {
    alert("Preencha tudo e adicione pedidos!");
    return;
  }

  let total = pedidos.reduce((acc,p)=>acc+p.valor,0);

  let msg = `🛒 Pedido:

Servidor: ${server}
Nick: ${nick}
Total: R$ ${total.toFixed(2)}

⚠️ Pagamento após confirmação`;

  window.open("https://wa.me/558893568660?text=" + encodeURIComponent(msg), "_blank");
}

render();

</script>

</body>
</html>
