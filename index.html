<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Índio Perfume Rio Rise</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000, #1a0000);
  color: #fff;
  text-align: center;
}

header {
  background: #0d0d0d;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
  color: red;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: red;
  color: white;
  font-weight: bold;
}

.card {
  background: #111;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  border: 1px solid red;
  text-align: left;
}

.green { color: #00ff00; }
.yellow { color: yellow; }

</style>
</head>

<body>

<header>Índio Perfume Rio Rise</header>

<div class="container">

  <img src="logo.png" style="width:130px; border-radius:50%; margin-top:10px;">

  <input id="server" placeholder="Servidor">
  <input id="nick" placeholder="Nick">

  <input id="qtd" type="number" placeholder="Quantidade (K)">

  <button onclick="fazerPedido()">Fazer Pedido</button>

  <button onclick="limpar()">Limpar Histórico</button>

  <h3>📦 Pedidos</h3>

  <div id="lista"></div>

</div>

<script>

let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

function calcular(qtd) {
  let valor = (qtd / 1000) * 0.60;

  if (qtd >= 500000) {
    valor = (qtd / 1000) * 0.50;
  }

  return valor;
}

function fazerPedido() {

  let server = document.getElementById("server").value;
  let nick = document.getElementById("nick").value;
  let qtd = parseInt(document.getElementById("qtd").value);

  if (!server || !nick || !qtd) {
    alert("Preencha tudo!");
    return;
  }

  let valor = calcular(qtd);

  let pedido = {
    id: Date.now(),
    server,
    nick,
    qtd,
    valor,
    status: "Pendente"
  };

  pedidos.push(pedido);
  salvar();
  render();

  let msg = `🛒 Pedido:

Servidor: ${server}
Nick: ${nick}
Qtd: ${qtd}
Valor: R$ ${valor.toFixed(2)}

Status: Pendente`;

  window.open("https://wa.me/558893568660?text=" + encodeURIComponent(msg), "_blank");
}

function salvar() {
  localStorage.setItem("pedidos", JSON.stringify(pedidos));
}

function render() {

  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  pedidos.forEach(p => {

    lista.innerHTML += `
      <div class="card">
        <b>Servidor:</b> ${p.server}<br>
        <b>Nick:</b> ${p.nick}<br>
        <b>Qtd:</b> ${p.qtd}<br>
        <b>Valor:</b> R$ ${p.valor.toFixed(2)}<br>
        <b>Status:</b> <span class="${p.status === "Pago" ? "green" : "yellow"}">${p.status}</span><br><br>

        <button onclick="confirmar(${p.id})">Confirmar pagamento</button>
      </div>
    `;
  });
}

function confirmar(id) {

  pedidos = pedidos.map(p => {
    if (p.id === id) {
      p.status = "Pago";
    }
    return p;
  });

  salvar();
  render();
}

function limpar() {
  pedidos = [];
  salvar();
  render();
}

render();

</script>

</body>
</html>
