<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Índio Perfume Rio Rise</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
  text-align: center;
}

header {
  background: #111;
  padding: 20px;
  font-size: 24px;
  color: #ff0000;
  font-weight: bold;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

.box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #ff0000;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
}

.total {
  margin-top: 15px;
  font-size: 20px;
  color: #ff0000;
}

.info {
  font-size: 13px;
  margin-top: 10px;
  color: #ccc;
}
</style>

</head>

<body>

<header>
Índio Perfume Rio Rise
</header>

<div class="container">

  <div class="box">

    <input type="text" id="server" placeholder="Servidor">
    <input type="text" id="nick" placeholder="Nick do jogador">

    <div class="grid">
      <button onclick="add(1000)">1K</button>
      <button onclick="add(200000)">200K</button>
      <button onclick="add(500000)">500K</button>
      <button onclick="add(1000000)">1KK</button>
    </div>

    <div class="total" id="total">Total: R$ 0,00</div>

    <button onclick="enviar()">Enviar Pedido</button>
    <button onclick="limpar()" style="background:#444;">Limpar Carrinho</button>

    <div class="info">
      ⚠️ Pagamento somente após confirmação do vendedor
    </div>

  </div>

</div>

<script>

let total = 0;
let quantidade = 0;

function add(qtd) {
  let valor = (qtd / 1000) * 0.5;

  total += valor;
  quantidade += qtd;

  document.getElementById("total").innerText =
    "Total: R$ " + total.toFixed(2);
}

function limpar() {
  total = 0;
  quantidade = 0;

  document.getElementById("total").innerText =
    "Total: R$ 0,00";
}

function enviar() {

  let server = document.getElementById("server").value;
  let nick = document.getElementById("nick").value;

  if (!server || !nick) {
    alert("Preencha servidor e nick!");
    return;
  }

  if (total <= 0) {
    alert("Adicione algum pacote!");
    return;
  }

  let mensagem = `🛒 Pedido:

Servidor: ${server}
Nick: ${nick}
Quantidade: ${quantidade}
Valor: R$ ${total.toFixed(2)}

⚠️ Pagamento somente após confirmação do vendedor`;

  window.open(
    "https://wa.me/558893568660?text=" + encodeURIComponent(mensagem),
    "_blank"
  );

}

</script>

</body>
</html>
