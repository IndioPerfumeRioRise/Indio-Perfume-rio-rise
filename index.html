<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Índio Perfume Rio Rise</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000, #1a0000);
  color: #fff;
  text-align: center;
}

/* topo */
header {
  background: #0d0d0d;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
  color: #ff0000;
  box-shadow: 0 2px 15px rgba(255,0,0,0.4);
}

/* container */
.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

/* card */
.box {
  background: rgba(255,0,0,0.08);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 20px;
  border: 1px solid rgba(255,0,0,0.3);
}

/* inputs */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  outline: none;
}

/* botões */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #ff0000, #8b0000);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
}

/* total */
.total {
  margin-top: 15px;
  font-size: 22px;
  color: #ff0000;
  font-weight: bold;
}

/* aviso */
.info {
  font-size: 13px;
  margin-top: 10px;
  color: #ccc;
}
</style>

</head>

<body>

<header>
Índio Perfume Rio Rise
</header>
