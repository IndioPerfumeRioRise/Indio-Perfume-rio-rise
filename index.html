<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Índio Perfume Rio Rise</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000, #1a0000);
  color: #fff;
  text-align: center;
}

header {
  background: #0d0d0d;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
  color: #ff0000;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.box {
  background: rgba(255,0,0,0.08);
  padding: 20px;
  border-radius: 20px;
  border: 1px solid rgba(255,0,0,0.3);
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #ff0000, #8b0000);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
}

.total {
  margin-top: 15px;
  font-size: 22px;
  color: #ff0000;
  font-weight: bold;
}

.economia {
  margin-top: 10px;
  color: #00ff00;
  font-weight: bold;
}

.info {
  font-size: 13px;
  margin-top: 10px;
  color: #ccc;
}
</style>

</head>

<body>

<header>
Índio Perfume Rio Rise
</header>

<div class="container">

  <div class="box">

    <input type="text" id="server" placeholder="Servidor">
    <input type="text" id="nick" placeholder="Nick do jogador">

    <div class="grid">
      <button onclick="add(1000)">1K</button>
      <button onclick="add(200000)">200K</button>
      <button onclick="add(500000)">500K</button>
      <button onclick="add(1000000)">1KK</button>
    </div>

    <h4>Quantidade personalizada (K)</h4>
    <input type="number" id="custom" placeholder="Digite a quantidade">

    <button onclick="addCustom()">Adicionar quantidade</button>

    <div class="total" id="total">Total: R$ 0,00</div>

    <div class="economia" id="economia"></div>

    <button onclick="enviar()">Enviar Pedido</button>

    <button onclick="limpar()" style="background:#333;">
      Limpar Carrinho
    </button>

    <div class="info">
      ⚠️ Pagamento somente após confirmação do vendedor
    </div>

  </div>

</div>

<script>

let total = 0;
let quantidade = 0;

function calcularValor(qtd) {

  let preco = 0.60;

  // desconto automático
  if (qtd >= 500000) {
    preco = 0.50;
  }

  return (qtd / 1000) * preco;
}

  let valorSemDesconto = (qtd / 1000) * 0.60;
  let valorFinal = calcularValor(qtd);

  let economia = valorSemDesconto - valorFinal;

  quantidade += qtd;

    "Total: R$ " + total.toFixed(2);
