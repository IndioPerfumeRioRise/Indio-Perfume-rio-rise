<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Índio Perfume Rio Rise</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
  text-align: center;
}

header {
  background: #111;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
  color: #00ffcc;
}

.container {
  max-width: 450px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
}

h3 {
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #00ffcc;
  font-weight: bold;
  cursor: pointer;
}

.total {
  margin-top: 15px;
  font-size: 22px;
  color: #00ffcc;
}

.info {
  margin-top: 10px;
  font-size: 14px;
  color: #ccc;
}
</style>

</head>

<body>

<header>
Índio Perfume Rio Rise
</header>

<div class="container">

  <div class="card">

    <h3>Comprar Perfumes</h3>

    <input type="number" id="qtd" placeholder="Digite a quantidade (ex: 100 = 100k)">

    <button onclick="adicionar()">Adicionar</button>

    <div class="total" id="total">Total: R$ 0,00</div>

    <div class="info">
      Valor: R$ 0,50 a cada 1k<br>
      Ex: 10.000 = R$ 5,00
    </div>

    <button onclick="enviar()">Enviar Pedido</button>

  </div>

</div>

<script>

let total = 0;
let quantidade = 0;

function adicionar() {

  let q = document.getElementById("qtd").value;

  if (!q || q <= 0) {
    alert("Digite uma quantidade válida!");
    return;
  }

  let valor = (q / 1000) * 0.5;

  total += valor;
  quantidade += parseInt(q);

  document.getElementById("total").innerText =
    "Total: R$ " + total.toFixed(2);

  document.getElementById("qtd").value = "";
}

function enviar() {

  if (total <= 0) {
    alert("Adicione algo ao carrinho!");
    return;
  }

  let mensagem = `🛒 Pedido:

Quantidade: ${quantidade}
Valor: R$ ${total.toFixed(2)}
Data: ${new Date().toLocaleString()}`;

  window.open(
    "https://wa.me/558893568660?text=" + encodeURIComponent(mensagem),
    "_blank"
  );

  total = 0;
  quantidade = 0;

  document.getElementById("total").innerText = "Total: R$ 0,00";
}

</script>

</body>
  </html>
