<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Índio Perfume Rio Rise</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: #fff;
      text-align: center;
    }

    h1 {
      color: #00ffcc;
      margin-top: 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: #111;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #00ffcc;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .total {
      margin-top: 15px;
      font-size: 20px;
      color: #00ffcc;
    }
  </style>
</head>

<body>

  <h1>Índio Perfume Rio Rise</h1>

  <div class="container">

    <h3>Quantidade (em K)</h3>

    <input type="number" id="quantidade" placeholder="Digite a quantidade">

    <button onclick="adicionar()">Adicionar</button>

    <div class="total" id="total">
      Total: R$ 0,00
    </div>

    <button onclick="enviarWhatsApp()">Enviar Pedido pelo WhatsApp</button>

  </div>

  <script>
    let total = 0;
    let quantidadeTotal = 0;

    function adicionar() {
      let q = document.getElementById('quantidade').value;

      if (!q || q <= 0) {
        alert('Digite uma quantidade válida!');
        return;
      }

      let valor = (q / 1000) * 0.5;

      total += valor;
      quantidadeTotal += parseInt(q);

      document.getElementById('total').innerText =
        "Total: R$ " + total.toFixed(2);

      document.getElementById('quantidade').value = "";
    }

    function enviarWhatsApp() {
      if (total <= 0) {
        alert("Adicione algo ao carrinho!");
        return;
      }

      let mensagem = `Pedido:
Quantidade: ${quantidadeTotal}
Valor: R$ ${total.toFixed(2)}
Data: ${new Date().toLocaleString()}`;

      window.open(
        "https://wa.me/558893568660?text=" + encodeURIComponent(mensagem),
        "_blank"
      );

      total = 0;
      quantidadeTotal = 0;

      document.getElementById('total').innerText = "Total: R$ 0,00";
    }
  </script>

</body>
</html>
